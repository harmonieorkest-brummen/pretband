name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 25
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies 🔧
        run: npm ci
        working-directory: app

      - name: Run tests 🧪 (with coverage gate)
        run: npm run test:coverage
        working-directory: app

      - name: Build 🏗️
        run: npm run build
        working-directory: app
        env:
          VITE_GTM_TAG_ID: ${{ secrets.VITE_GTM_TAG_ID }}
          VITE_INSTAGRAM_URL: ${{ secrets.VITE_INSTAGRAM_URL }}
          VITE_TIKTOK_URL: ${{ secrets.VITE_TIKTOK_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://pretband.nl' }}
          VITE_BASIN_FORM_ID: ${{ secrets.VITE_BASIN_FORM_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_COOKIEBOT_ID: ${{ secrets.VITE_COOKIEBOT_ID }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: app/dist
          branch: gh-pages
