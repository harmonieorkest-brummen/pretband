name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies 🔧
        run: npm ci
        working-directory: app

      - name: Build 🏗️
        run: npm run build
        working-directory: app
        env:
          VITE_GTM_TAG_ID: ${{ secrets.VITE_GTM_TAG_ID }}
          VITE_INSTAGRAM_URL: ${{ secrets.VITE_INSTAGRAM_URL }}
          VITE_TIKTOK_URL: ${{ secrets.VITE_TIKTOK_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://hobrummen.github.io/pretband' }}
          VITE_BASIN_FORM_ID: ${{ secrets.VITE_BASIN_FORM_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_COOKIEBOT_ID: ${{ secrets.VITE_COOKIEBOT_ID }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: app/dist
          branch: gh-pages
